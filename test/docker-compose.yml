services:
  floci:
    image: hectorvent/floci:latest
    ports:
      - "4566"
    mem_limit: 128m

  test:
    build:
      context: ..
      dockerfile: test/Dockerfile
    privileged: true
    depends_on:
      - floci
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
    mem_limit: 512m
